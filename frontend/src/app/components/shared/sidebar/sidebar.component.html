<aside class="sidebar">
  <button class="sidebar-close-btn" (click)="closeSidebar()" aria-label="Close menu">✕</button>

  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" width="20" height="20">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">VoiceOPD</div>
      <div class="logo-sub">{{ clinic?.name || 'OPD Management' }}</div>
    </div>
  </div>

  <nav class="nav">
    <div class="nav-section">Main Menu</div>

    <a [routerLink]="['/dashboard']" class="nav-item" [class.active]="isActive('/dashboard')" (click)="closeSidebar()">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>

    <a [routerLink]="['/patients']" class="nav-item" [class.active]="isActive('/patients')" (click)="closeSidebar()">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>
      Patients
    </a>

    <a [routerLink]="['/tokens']" class="nav-item" [class.active]="isActive('/tokens')" (click)="closeSidebar()">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Tokens
      <span class="nav-badge amber" *ngIf="pendingTokens > 0">{{ pendingTokens }}</span>
    </a>

    <a [routerLink]="['/prescriptions']" class="nav-item" [class.active]="isActive('/prescriptions')" (click)="closeSidebar()">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Prescriptions
    </a>

    <a [routerLink]="['/visits']" class="nav-item" [class.active]="isActive('/visits')" (click)="closeSidebar()">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12 19.79 19.79 0 0 1 1.08 3.37 2 2 0 0 1 3.06 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/></svg>
      Visits
    </a>

    <a [routerLink]="['/reports']" class="nav-item" [class.active]="isActive('/reports')" (click)="closeSidebar()">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Reports
    </a>

    <a [routerLink]="['/settings']" class="nav-item" [class.active]="isActive('/settings')" (click)="closeSidebar()">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
      Settings
    </a>

    <!-- Admin only -->
    <div class="nav-section" *ngIf="doctor?.role === 'superadmin'" style="margin-top:8px">Admin</div>
    <a *ngIf="doctor?.role === 'superadmin'"
       [routerLink]="['/admin']" class="nav-item admin-link" [class.active]="isActive('/admin')" (click)="closeSidebar()">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Admin Panel
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="doc-avatar">{{ getInitials(doctor?.name || '') }}</div>
    <div class="doc-info">
      <div class="doc-name">{{ doctor?.name || 'Doctor' }}</div>
      <div class="doc-role">{{ doctor?.specialization }}</div>
    </div>
    <button class="logout-btn" (click)="logout()" title="Logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</aside>
