version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: voiceopd-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: voiceopd

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voiceopd-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/voiceopd
      JWT_SECRET: change_this_in_production_min_32_chars
      JWT_REFRESH_SECRET: change_this_refresh_secret_too
      CLIENT_URL: http://localhost:4200
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voiceopd-ui
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mongo-data:
